name: Release Rhizome.app

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16 (Swift 6)
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Build Rhizome.app
        run: ./scripts/build-rhizome-app.sh

      - name: Zip Rhizome.app
        run: |
          mkdir -p artifacts
          ditto -c -k --keepParent dist/Rhizome.app artifacts/Rhizome.app.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rhizome.app
          path: artifacts/Rhizome.app.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/Rhizome.app.zip
          generate_release_notes: true
          body: |
            Download `Rhizome.app.zip`, unzip, and drag Rhizome.app to /Applications.

            The build is ad-hoc signed (not notarized). On first launch you may need to clear the quarantine flag:

            ```
            xattr -dr com.apple.quarantine /Applications/Rhizome.app
            open /Applications/Rhizome.app
            ```
